<!DOCTYPE html>
<html lang="no">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="https://fonts.googleapis.com/css?family=Open+Sans:100,300,400,600,700" rel="stylesheet" type="text/css">
        <link type="text/css" rel="stylesheet" href="style.css">
        <title>Dice &amp; Monsters</title>
    </head>

    <body>
        <header class="topbar">
            <h1>Dice &amp; Monsters</h1>
            <p class="tagline">Bygg en D&amp;D-encounter, angrip, og se monstrene dø.</p>
        </header>

        <!-- Monstervelger: alle monstrene fra fila -->
        <section class="picker">
            <div class="picker__row">
                <input type="text" id="search" class="picker__search" placeholder="Søk monster…">
                <select id="cr-filter" class="picker__cr"></select>
            </div>
            <div class="picker__row">
                <select id="monster-select" class="picker__select" size="6"></select>
            </div>
            <div class="picker__row picker__row--actions">
                <span id="match-count" class="picker__count"></span>
                <div class="picker__buttons">
                    <button class="btn-random">Tilfeldig</button>
                    <button class="btn-add">Legg til i encounter</button>
                </div>
            </div>
        </section>

        <!-- Spillere (foreløpig bare navn) -->
        <section class="players">
            <h2 class="players__title">Spillere</h2>
            <div class="players__row">
                <input type="text" id="player-name" class="players__name" placeholder="Spillernavn…">
                <input type="number" id="player-init" class="players__init" placeholder="init +" title="Valgfritt initiativ-tillegg">
                <button class="btn-add-player">Legg til spiller</button>
            </div>
        </section>

        <!-- Turordning / initiativ -->
        <section class="tracker">
            <div class="tracker__head">
                <h2 class="tracker__title">Turordning</h2>
                <div class="tracker__buttons">
                    <button class="btn-init">Rull initiativ</button>
                    <button class="btn-next" disabled>Neste tur</button>
                </div>
            </div>
            <div id="turn-order" class="turn"></div>
        </section>

        <!-- Encounteren -->
        <section class="encounter">
            <div class="encounter__head">
                <h2 class="encounter__title">Encounter</h2>
                <span id="encounter-meta" class="encounter__meta"></span>
                <button class="btn-clear">Tøm encounter</button>
            </div>
            <div class="monster__list"></div>
        </section>

        <!-- Kamplogg -->
        <section class="logwrap">
            <h2 class="logwrap__title">Kamplogg</h2>
            <div id="log" class="log"></div>
        </section>

        <script src="monsters-data.js"></script>
        <script src="Dice&Monsters.js"></script>
    </body>
</html>
